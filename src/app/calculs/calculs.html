<div class="calc-page">
  <div class="calc-shell">

    <!-- Header -->
    <div class="calc-header">
      <span class="calc-header-dot dot-red"></span>
      <span class="calc-header-dot dot-yellow"></span>
      <span class="calc-header-dot dot-green"></span>
      <span class="calc-header-title">Calculatrice</span>
    </div>

    <!-- Display screen -->
    <div class="calc-screen">
      <div class="calc-screen-inputs">
        <div class="form-group">
          <label for="op1" class="calc-label">Nombre 1</label>
          <input type="number" class="form-control calc-input" id="op1" [(ngModel)]="op1" name="op1" placeholder="0" />
        </div>
        <div class="form-group">
          <label for="op2" class="calc-label">Nombre 2</label>
          <input type="number" class="form-control calc-input" id="op2" [(ngModel)]="op2" name="op2" placeholder="0" />
        </div>
      </div>

      <!-- Result display -->
      <div class="calc-result-display">
        <span class="calc-result-label">Résultat</span>
        <span class="calc-result-value">{{ res }}</span>
      </div>
    </div>

    <!-- Operation buttons -->
    <div class="calc-keypad">
      <div class="btn-group btn-group-justified" role="group">
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-success calc-op-btn" (click)="add()">
            <span class="op-icon">＋</span>
            <span class="op-label">Addition</span>
          </button>
        </div>
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-danger calc-op-btn" (click)="sub()">
            <span class="op-icon">－</span>
            <span class="op-label">Soustraction</span>
          </button>
        </div>
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-info calc-op-btn" (click)="mul()">
            <span class="op-icon">×</span>
            <span class="op-label">Multiplication</span>
          </button>
        </div>
        <div class="btn-group" role="group">
          <button type="button" class="btn btn-warning calc-op-btn" (click)="div()">
            <span class="op-icon">÷</span>
            <span class="op-label">Division</span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
