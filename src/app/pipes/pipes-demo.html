<div class="container">
  <h2>Pipes - Solutions TP</h2>

  <!-- TP 1: Count Character -->
  <div class="tp-section tp1">
    <h3>TP 1 - Compter l'occurrence d'un caractère</h3>
    <div class="form-group">
      <label>Chaîne: <input type="text" [(ngModel)]="countCharInput" placeholder="Bonjour"></label>
      <label>Caractère: <input type="text" [(ngModel)]="charToCount" placeholder="o" maxlength="1"></label>
    </div>
    <div class="result">
      <strong>Résultat:</strong>
      <span>{{ countCharInput() | countChar: charToCount() }}</span>
    </div>
  </div>

  <!-- TP 2: Reverse String -->
  <div class="tp-section tp2">
    <h3>TP 2 - Inverser une chaîne de caractères</h3>
    <div class="form-group">
      <label>Chaîne: <input type="text" [(ngModel)]="reverseInput" placeholder="Bonjour"></label>
    </div>
    <div class="result">
      <strong>Inversée:</strong>
      <span>{{ reverseInput() | reverseStr }}</span>
    </div>
  </div>

  <!-- TP 3: Sum Digits -->
  <div class="tp-section tp3">
    <h3>TP 3 - Somme des chiffres d'un nombre</h3>
    <div class="form-group">
      <label>Nombre: <input type="text" [(ngModel)]="sumDigitsInput" placeholder="4576"></label>
    </div>
    <div class="result">
      <strong>Somme:</strong>
      <span>{{ sumDigitsInput() | sumDigits }}</span>
    </div>
  </div>
</div>
